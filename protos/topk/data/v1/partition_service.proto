syntax = "proto3";
package topk.data.v1;

service PartitionService {
    // List partitions
    rpc List(ListPartitionsRequest) returns (stream Partitions);

    // Delete partition
    rpc Delete(DeletePartitionRequest) returns (DeletePartitionResponse);
}

message ListPartitionsRequest {
    // Prefix to list partitions.
    // If empty, all partitions are listed.
    optional string prefix = 1;
}

message Partitions {
    // Batch of partitions matching the requested prefix
    repeated Partition partitions = 1;
}

message Partition {
    // Partition name
    string name = 1;
    // Partition created at
    string created_at = 2;
}

message DeletePartitionRequest {
    // Name of the partition to delete
    string partition_name = 1;
}

message DeletePartitionResponse {}
