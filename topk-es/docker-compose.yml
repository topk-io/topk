services:
  kibana:
    image: docker.elastic.co/kibana/kibana:8.18.0
    environment:
      # Defaults to the shim; set to http://elasticsearch:9200 for real ES. The emulator gateway
      # routes by Host header and only accepts the hostnames on its HTTPRoute, so this must be
      # `emulator.es.ddb` — `host.docker.internal` gets a 404 from the gateway, not the shim.
      ELASTICSEARCH_HOSTS: ${KIBANA_ES_URL:-http://emulator.es.ddb:9200}
      # Sent as `Authorization: Bearer <token>`, which is what ddb-auth expects. This covers
      # Kibana's own system calls (migration, task manager).
      ELASTICSEARCH_SERVICEACCOUNTTOKEN: ${TOPK_API_KEY:-}
      # zdt is the algorithm Serverless Kibana uses — our target surface. It migrates in place,
      # avoiding v2's default clone/write-block/reindex-temp path (endpoints Serverless lacks too).
      MIGRATIONS_ALGORITHM: zdt
      # Without this the Streams plugin's alerts client (`/internal/streams/_status`) 500s on every
      # call. Dev-only fixed key (needs 32+ chars) — no real secrets stored behind it here.
      XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY: "topk-es-dev-only-encryption-key-not-a-secret"
    extra_hosts:
      - "emulator.es.ddb:host-gateway"
    ports:
      - "5601:5601"
    # `serviceAccountToken` alone doesn't cover requests Kibana makes on behalf of an incoming
    # browser call (data views, Discover, etc.) — those forward whatever Authorization header the
    # browser sent, which is nothing (we have no Kibana login configured). `elasticsearch.
    # customHeaders` fixes that by attaching a header to every outgoing ES request unconditionally,
    # but it's a record type the docker image's env-var whitelist can't encode (JSON-string env var
    # is rejected: "could not parse record value from json input") — so append it to kibana.yml as
    # real YAML at container start. `${TOPK_API_KEY}` is inlined by *compose* here (this whole
    # entrypoint value goes through compose's own variable substitution), not read at container
    # runtime — the container has no bare `TOPK_API_KEY` var, only the renamed one above.
    entrypoint:
      - bash
      - -c
      - |
        grep -q '^elasticsearch.customHeaders:' /usr/share/kibana/config/kibana.yml || \
          printf '\nelasticsearch.customHeaders:\n  Authorization: "Bearer ${TOPK_API_KEY:-}"\n' >> /usr/share/kibana/config/kibana.yml
        exec /usr/local/bin/kibana-docker

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      # 9201, not 9200 — the emulator ES proxy defaults to 9200, and
      # conformance runs point ES_URL at each backend in turn without
      # tearing the other one down first.
      - "9201:9200"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:9200/_cluster/health || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 24 # 24 * 5s = 2 minutes
      start_period: 10s
